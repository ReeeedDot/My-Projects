<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whatsapp Clone</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="#" class="logo">whatsapp</a>
            <div class="action">
                <a href="#"><ion-icon name="camera-outline"></ion-icon></a>
            <a href="#"><ion-icon name="search-outline"></ion-icon></a>
                <a href="#"><ion-icon name="ellipsis-vertical"></ion-icon></a>
            </div>
        </header>
        <div class="tabs">
            <input id="chats" type="radio" name="group"checked>
            <input id="status" type="radio" name="group">
            <input id="calls" type="radio" name="group">
            </div>
           
            <div class="buttons">
                <label for="chats">Chats</label>
                <label for="status">Status</label>
                <label for="calls">Calls</label>
                <div class="underline"></div>
            </div>
            <div class="content">
                 <div class="box chats">
                    <div class="data">
                        <div class="chatlist">
                            <div class="block unread">
                                <div class="imgbx">
                                    <img src="img1.jpg">
                                </div>
                                <div class="details">
                                    <div class="listHead">
                                        <h4>Ajit Marandi</h4>
                                         <p class="time">10:56</p>
                                    </div>
                                    <div class="message_p">
                                        <p>How to make whatsapp clone using html & css</p>
                                        <b>1</b>
                                    </div>
                                </div>
                            </div> 
                            <div class="block">
                                <div class="imgbx">
                                    <img src="img2.jpg">
                                </div>
                                <div class="details">
                                    <div class="listHead">
                                        <h4>Rahul</h4>
                                        <p class="time">15/10/2022</p>
                                    </div>
                                    <div class="message_p">
                                        <p>Happy Birthday</p>
                                    </div>
                                </div>
                            </div>
                            <div class="block">
                                <div class="imgbx">
                                    <img src="img2.jpg">
                                </div>
                                <div class="details">
                                    <div class="listHead">
                                        <h4>Praveen</h4>
                                        <p class="time">13:32</p>
                                    </div>
                                    <div class="message_p">
                                        <p>Congrats</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div> 
                 <div class="box_status">Status</div>
                 <div class="box_calls">Calls</div>
                </div>
        </div>
        
    </div>

    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>
</html>
