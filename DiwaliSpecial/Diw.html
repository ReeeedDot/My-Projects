<html>
    <head>
        <title>
            Diwali Special
        </title>
        <style>
            .fireworks-container{
                position:relative;
                width:100%;
                height: 100%;
                background-color: black;
            }


          .firework{
                position:relative;
                align-items: right;
                justify-content: right;
                width:10px;
                height: 10px;
                background-color: red;
                border-radius: 50%;
                animation: explode 1s infinite;
            }

            .firework1{
                position:absolute;
                align-items: left;
                justify-content:  left;
                width:10px;
                height: 10px;
                background-color: blanchedalmond;
                border-radius: 20%;
                animation: explode 3s infinite;
            }

            @keyframes explode{
                0%{
                    transform: scale(10);
                    opacity:1;
                }
            }
        </style>
    </head>
    <body>
        <div class="fireworks-container">
            <div class="firework"></div>
            <div class="firework1"></div>
        </div>
    </body>
</html>
