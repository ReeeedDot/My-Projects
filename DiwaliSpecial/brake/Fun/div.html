<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inner box</title>
</head>
<style>

    body{
        width:100%;
        height: 100%;
        background-color:rgba(135, 207, 235, 0.775);
    }
    div{
        grid-template-columns: auto;
    }
    .box{
        
        width:500px;
        height: 50px;
        margin:4% 0% 0% 4%;
        border-radius: 40px;
        background-color: rgba(135, 207, 235, 0.682);
        box-shadow: inset -3px -3px 7px #ffffff98,inset 3px 3px 5px rgba(0, 0, 0, 0.411);
    }
    .box p{
        display:flex;
        width: auto;
        height: auto;
        margin:5%;
    }
    .inr{display: inline-block;
        grid-template-columns: repeat(4, 1fr);
        aspect-ratio: 1/1;
        width:50px;
        height:45px;
        margin-top: 4%;
        margin-left: 4%;
        align-content: center;
        border-radius: 19px;
        background-color: rgba(135, 207, 235, 0.736);
        box-shadow:  inset -3px -3px 7px #ffffff98,inset 3px 3px 5px rgba(0, 0, 0, 0.411);
    }

    /* .inr p{
        width:100%;
        height:100%;
        margin:4%;
        color: blue;
        display: inline-block;
    } */

    
</style>
<body>
    <div class="box"> 
      <p>Search</p> 
    </div>
    <div class="inr"></div>
    <div class="inr"></div>
    <div class="inr"></div>
    <div class="inr"></div>
</body>
</html>
