<!DOCTYPE html>
<html>
    <head>

    </head>
    <style>
        .flex-container{
            display:flex;
        }
        .item{
            flex:1;
            padding:10px;
            border:1px solid black;
            background-color: bisque;
            transition: transform 0.3s ease;
        }

        .item:hover{
            transform:scale(1.1);
        }
    </style>
    <body>
        <div class="flex-container">
            <div class="item">item 1</div>
            <div class="item">item 2</div>
            <div class="item">item 3</div>
        </div>
    </body>
</html>
