<!DOCTYPE html>
   <head>
    <style>
       body{
            margin:0;
            height: 100vh;
            display:flex;
            align-items: center;
            justify-content:center;
            background-color: red;
            overflow:hidden;
        }
        .container{
            height:0;
            width:0;
            position:absolute;

        }
        .square{
            
           height: 70px;
           width: 70px;
           background-color: blue;
           justify-content: center;
           align-items: center;
           border-radius:40%;
           box-shadow: 0 0 3em white;
           animation: square 1s linear infinite;
           }
           .triangle{
            height:70px;
            width:70px;
            border-radius:40%;
            justify-content:left;
            align-content: left;
            background-color:green;
            box-shadow:0 0 3em pink;
            animation:triangle 2s linear infinite;
           }
           #square:hover{
            display:relative;
            height:40px;
            width:40px;
            border-radius:50%;
            background-color: pink;
           }
           @keyframes square{
            to{ 
                transform: rotate(360deg);
            }
           
           }
           @keyframes triangle{
             to{
                transform: rotate(-360deg);
             }  
              
            }
            h1{
                text-align: left;
                text-wrap: unset;
                background-color: blue;
                font-display: visible;
               

            }
    </style>
   </head>
   <body>
    <h1> Welcome here!</h1>
    <div class="container">
        <div class="square"></div>
        <div class="triangle"></div>
    </div>
   </body>
</html>
